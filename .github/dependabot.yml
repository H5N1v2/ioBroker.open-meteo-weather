version: 2
updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "5 2 * * 1"
    open-pull-requests-limit: 15
    assignees:
      - "H5N1v2"
    versioning-strategy: "increase"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "5 2 * * 1"
    open-pull-requests-limit: 15
    assignees:
      - "H5N1v2"